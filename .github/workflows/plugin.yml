name: Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate plugin manifest
        run: |
          test -f plugin/.claude-plugin/plugin.json
          test -f plugin/.mcp.json
          test -f plugin/skills/climatenet-query/SKILL.md
          jq -e '.name == "climatenet"' plugin/.claude-plugin/plugin.json

      - name: Build climatenet.plugin
        run: |
          cd plugin
          zip -r ../climatenet.plugin . -x "*.DS_Store"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: climatenet-plugin
          path: climatenet.plugin

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" climatenet.plugin --clobber
